services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  mock-crm:
    image: mendhak/http-https-echo:34
    restart: unless-stopped
    ports:
      - "9999:8080"
    environment:
      HTTP_PORT: 8080

  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379/0
      CRM_WEBHOOK_URL: http://mock-crm:8080/webhook

volumes:
  redis-data:
